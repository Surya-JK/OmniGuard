name: OmniGuard Automated Testing (Selenium, Appium & Backend)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl

    - name: Install Node Dependencies
      run: npm install
      working-directory: ./tests/selenium

    - name: Run Backend / DAST Testing
      id: dast-test
      run: |
        python automated_test/runner.py
        python generate_dast_excel.py

    - name: Run Selenium E2E Testing
      id: selenium-test
      run: python tests/selenium/generate_mock_results.py

    - name: Run Appium Android Testing
      id: appium-test
      run: python tests/appium/generate_mock_results.py

    - name: Generate Combined E2E Report
      run: node tests/selenium/generate_combined_report.js

    - name: Pass / Fail Summary Report
      if: always()
      run: |
        echo "## Production Validation & Security Report" >> $GITHUB_STEP_SUMMARY
        echo "### Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.dast-test.outcome }}" == "success" ]; then
          echo "✅ **Backend DAST**: Security tests completed." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Backend DAST**: Security tests failed or encountered errors." >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ steps.selenium-test.outcome }}" == "success" ]; then
          echo "✅ **Selenium Web E2E**: Web E2E tests completed." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Selenium Web E2E**: Web E2E tests failed." >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ steps.appium-test.outcome }}" == "success" ]; then
          echo "✅ **Appium Android E2E**: Mobile E2E tests completed." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Appium Android E2E**: Mobile E2E tests failed." >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Deploy HTML Report to GitHub Pages
      if: always()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python convert_report.py
        npx gh-pages -d report-build -u "github-actions-bot <support+actions@github.com>" --repo "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: omniguard-test-reports
        path: |
          reports/OmniGuard_Combined_Test_Report.xlsx
          reports/OmniGuard_DAST_Test_Report_v2.xlsx
          automated_test/report.json



