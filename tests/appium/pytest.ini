[pytest]
# OmniGuard — Appium Android E2E pytest configuration

testpaths     = tests
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# Markers
markers =
    login: Login and authentication tests
    home: Home dashboard tests
    scan: Scanning and analysis tests
    vault: Vault/history tests
    chat: AI chat tests
    premium: Premium upgrade tests
    smoke: Quick sanity checks (subset of all tests)

# Output
log_cli       = true
log_cli_level = INFO
log_format    = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S

# Timeouts (seconds per test)
timeout = 120

# HTML report path
addopts = --html=reports/appium_pytest_report.html --self-contained-html -v
