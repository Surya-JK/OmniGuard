
<!DOCTYPE html>
<html>
<head>
    <title>OmniGuard Combined Test Report</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0B1120;
            color: #E5E5EA;
            padding: 40px;
        }
        h1 {
            color: #00F0FF;
            text-align: center;
            margin-bottom: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1C1C1E;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th {
            background-color: rgba(28, 28, 30, 0.95);
            color: #8E8E93;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        tr:hover {
            background-color: rgba(255,255,255,0.02);
        }
        .status-PASSED {
            color: #00FF9D;
            font-weight: bold;
        }
        .status-FAILED {
            color: #EF4444;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>OmniGuard Automated Test Report</h1>
    <table border="1" class="dataframe table">
  <thead>
    <tr style="text-align: right;">
      <th>OmniGuard — Combined Web & Android Test Report</th>
      <th>Unnamed: 1</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>NaN</td>
      <td>NaN</td>
    </tr>
    <tr>
      <td>Total Tests</td>
      <td>200</td>
    </tr>
    <tr>
      <td>Passed</td>
      <td>200</td>
    </tr>
    <tr>
      <td>Failed</td>
      <td>0</td>
    </tr>
    <tr>
      <td>Skipped</td>
      <td>0</td>
    </tr>
    <tr>
      <td>Pass Rate</td>
      <td>100.0%</td>
    </tr>
  </tbody>
</table>
    <script>
        // Add color coding to outcomes
        document.querySelectorAll('td').forEach(td => {
            if(td.innerText.trim() === 'PASSED') td.classList.add('status-PASSED');
            if(td.innerText.trim() === 'FAILED') td.classList.add('status-FAILED');
        });
    </script>
</body>
</html>
